services:
  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "8080:80"
    depends_on:
      - lida-backend

  lida-backend:
    build:
      context: .
      target: backend
    ports:
      - "8000:8080"
    env_file: .env
    environment:
      - LLMX_CONFIG_PATH=/config/cfg.yml
    volumes:
      - ./config:/config